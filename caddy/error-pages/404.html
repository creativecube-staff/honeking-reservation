<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページが見つかりません | ほねキング整骨院</title>
  <!-- 表示前にホスト名でテーマ切替（チラつき防止のため head 内で実行） -->
  <script>
    document.documentElement.classList.add(
      location.hostname.indexOf('admin.') === 0 ? 'theme-admin' : 'theme-public'
    );
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "メイリオ", sans-serif;
      background: #fff;
      color: #334155;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ====== Public（お客様）テーマ ====== */
    html.theme-admin .brand-public,
    html.theme-admin .footer-public { display: none; }
    html.theme-public .brand-admin { display: none; }

    .brand-public {
      background: #fff3db;
      border-bottom: 4px solid #fcd34d;
      padding: 0.75rem 1rem;
    }
    .brand-public .container {
      max-width: 64rem;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .brand-public img { height: 2.5rem; width: auto; }
    .brand-public .title {
      font-weight: 600;
      color: #475569;
      display: none;
    }
    @media (min-width: 640px) {
      .brand-public img { height: 3rem; }
      .brand-public .title { display: inline; font-size: 1.125rem; }
    }

    /* ====== Admin テーマ ====== */
    .brand-admin {
      background: #1d2327;
      color: #c3c4c7;
      padding: 0 0.75rem;
      height: 2rem;
      display: flex;
      align-items: center;
      font-size: 0.75rem;
    }
    .brand-admin .brand-name { color: #fff; font-weight: 600; }

    /* ====== メイン ====== */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .card {
      width: 100%;
      max-width: 32rem;
      text-align: center;
    }
    .icon-circle {
      margin: 0 auto 1.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 5rem;
      height: 5rem;
      border-radius: 9999px;
      background: #fef3c7;
    }
    html.theme-admin .icon-circle { background: #f1f5f9; }
    .icon-circle svg {
      width: 2.5rem;
      height: 2.5rem;
      color: #d97706;
    }
    html.theme-admin .icon-circle svg { color: #64748b; }

    .status-num {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-bottom: 0.5rem;
      color: #fbbf24;
    }
    html.theme-admin .status-num { color: #94a3b8; }
    @media (min-width: 640px) {
      .status-num { font-size: 4.5rem; }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.75rem;
    }
    @media (min-width: 640px) {
      h1 { font-size: 1.5rem; }
    }

    .desc {
      font-size: 0.875rem;
      color: #475569;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.5rem;
      border-radius: 0.375rem;
      font-weight: 600;
      color: #fff;
      background: #f97316;
      transition: background 0.15s ease;
    }
    .btn-home:hover { background: #ea580c; }
    html.theme-admin .btn-home { background: #334155; }
    html.theme-admin .btn-home:hover { background: #1e293b; }
    .btn-home svg { width: 1rem; height: 1rem; }

    /* ====== Footer（Public のみ表示） ====== */
    .footer-public {
      background: #fff;
      border-top: 4px solid #fcd34d;
      padding: 1rem;
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <!-- お客様向けヘッダ -->
  <header class="brand-public">
    <div class="container">
      <a href="/" style="display:flex; align-items:center; gap:0.75rem;">
        <img src="https://honeking.jp/wp/wp-content/themes/honeking/assets/img/common/header-logo.svg" alt="ほねキング整骨院" />
        <span class="title">予約システム</span>
      </a>
    </div>
  </header>

  <!-- Admin 向けヘッダ -->
  <header class="brand-admin">
    <span class="brand-name">honeking 管理</span>
  </header>

  <main>
    <div class="card">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
      </div>
      <p class="status-num">404</p>
      <h1>ページが見つかりません</h1>
      <p class="desc">
        お探しのページは削除されたか、<br />
        URLが変更された可能性があります。
      </p>
      <a href="/" class="btn-home" id="home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span id="home-label">サイトトップへ戻る</span>
      </a>
    </div>
  </main>

  <footer class="footer-public">© ほねキング整骨院</footer>

  <script>
    (function () {
      // Admin ホストならリンク先と文言を差し替え
      if (document.documentElement.classList.contains('theme-admin')) {
        var btn = document.getElementById('home-btn');
        var label = document.getElementById('home-label');
        if (btn) btn.setAttribute('href', '/dashboard');
        if (label) label.textContent = '管理画面トップへ';
      }
    })();
  </script>
</body>
</html>
